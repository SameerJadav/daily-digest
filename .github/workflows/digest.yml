name: daily-digest
on:
  schedule:
    - cron: "30 0 * * *" # 06:00 IST
    - cron: "30 1 * * *" # 07:00 IST backup — no-op if the 06:00 run succeeded
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run digest.py ${{ github.event_name == 'schedule' && '--if-missing' || '' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - run: |
          git config user.name "digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data docs
          git commit -m "digest $(date -u +%F)" || exit 0
          git push
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
  deploy:
    needs: digest
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

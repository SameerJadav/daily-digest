name: daily-digest
on:
  schedule:
    # GitHub delays free-tier crons by 1-4h; schedule early + backups so one
    # lands before a ~5:00 IST wake-up. Scheduled runs are --if-missing, so
    # whichever fires first generates and the rest no-op.
    - cron: "47 21 * * *" # 03:17 IST
    - cron: "17 23 * * *" # 04:47 IST backup
    - cron: "47 0 * * *" # 06:17 IST backup
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv run digest.py ${{ github.event_name == 'schedule' && '--if-missing' || '' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - run: |
          git config user.name "digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data docs
          git commit -m "digest $(date -u +%F)" || exit 0
          git push
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs
  deploy:
    needs: digest
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Pages deployments fail transiently with "try again later" — one retry
      # has always been enough in practice
      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure'
        run: sleep 45
      - if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5

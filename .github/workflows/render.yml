name: render
# Re-renders docs/ from data/*.json (no AI) and deploys the site.
# Runs on template (digest.py), stylesheet, script, or data edits — or manually.
on:
  push:
    branches: [main]
    paths: [digest.py, docs/**, data/**]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
      - run: uv run digest.py render
      - run: |
          git config user.name "digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs
          git commit -m "re-render" || exit 0
          git push
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs
  deploy:
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure'
        run: sleep 45
      - if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5

name: render
# Re-renders docs/ from data/*.json without calling the AI.
# Runs when digest.py (templates) changes, or manually. CSS-only edits
# need nothing at all: docs/style.css is served as-is.
on:
  push:
    branches: [main]
    paths: [digest.py]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run digest.py render
      - run: |
          git config user.name "digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs
          git commit -m "re-render" || exit 0
          git push

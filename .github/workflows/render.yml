name: render
# Re-renders docs/ from data/*.json (no AI) and deploys the site.
# Runs on template (digest.py), stylesheet, script, or data edits — or manually.
on:
  push:
    branches: [main]
    paths: [digest.py, docs/**, data/**]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run digest.py render
      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: kokoro-82m
      - run: sudo apt-get install -y -q espeak-ng ffmpeg
      - run: uv run audio.py || echo "::warning::audio generation failed, publishing without audio"
      - run: |
          git config user.name "digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs
          git commit -m "re-render" || exit 0
          git push
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
  deploy:
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
